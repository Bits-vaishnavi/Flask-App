apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-web
  strategy:
    type: RollingUpdate  # This satisfies the "Rolling Update" requirement
  template:
    metadata:
      labels:
        app: fitness-web
    spec:
      containers:
      - name: fitness-app
        image: your_docker_username/aceest-fitness:latest # Replace with your Hub username
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: fitness-service
spec:
  type: NodePort
  selector:
    app: fitness-web
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30001 # Access your app at http://minikube-ip:30001