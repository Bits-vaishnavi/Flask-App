name: CI

on:
  push:
    branches: [main, "feature/blue-green-deployment"]
  pull_request:
    branches: [main, "feature/blue-green-deployment"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint / syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile test_app.py
          ruff check .

      - name: Run unit tests
        run: |
          pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness-api:ci .

      - name: Validate container can start
        run: |
          docker run --rm aceest-fitness-api:ci python -c "import app; print('ok')"
