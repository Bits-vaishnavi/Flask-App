version: "3.9"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Mount the app directory so code changes are picked up immediately.
      - ./:/app
      # Persist the SQLite database to the host so it survives container restarts.
      - ./aceest_fitness.db:/app/aceest_fitness.db
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
